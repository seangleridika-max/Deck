name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  deploy-worker:
    name: Deploy Worker to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          cd worker
          npm ci

      - name: Run D1 migrations
        run: |
          cd worker
          npx wrangler d1 migrations apply deck_db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy to Cloudflare Workers
        run: |
          cd worker
          npx wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Health check
        run: |
          sleep 10
          curl -f ${{ secrets.STAGING_WORKER_URL }}/health || exit 1

  deploy-frontend:
    name: Deploy Frontend to Staging
    runs-on: ubuntu-latest
    environment: staging
    needs: deploy-worker
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_URL: ${{ secrets.STAGING_WORKER_URL }}
          VITE_GEMINI_API_KEY: ${{ secrets.STAGING_GEMINI_API_KEY }}

      - name: Deploy to Cloudflare Pages
        run: |
          cd frontend
          npx wrangler pages deploy dist --project-name=deck-staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Smoke test
        run: |
          sleep 15
          curl -f ${{ secrets.STAGING_FRONTEND_URL }} || exit 1

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-worker, deploy-frontend]
    if: always()
    steps:
      - name: Send notification
        run: |
          STATUS="${{ needs.deploy-frontend.result }}"
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"Staging deployment $STATUS\",
              \"blocks\": [{
                \"type\": \"section\",
                \"text\": {
                  \"type\": \"mrkdwn\",
                  \"text\": \"*Deck Staging Deployment*\n Status: $STATUS\n Commit: ${{ github.sha }}\n URL: ${{ secrets.STAGING_FRONTEND_URL }}\"
                }
              }]
            }"
