name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2026.03.06-1)'
        required: true

env:
  NODE_VERSION: '18'

jobs:
  pre-deploy-checks:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify staging health
        run: |
          curl -f ${{ secrets.STAGING_WORKER_URL }}/health || exit 1

      - name: Check migration compatibility
        run: |
          cd worker
          npm ci
          npx wrangler d1 migrations list deck_db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-worker-canary:
    name: Deploy Worker (Canary 10%)
    runs-on: ubuntu-latest
    environment: production
    needs: pre-deploy-checks
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          cd worker
          npm ci

      - name: Backup D1 database
        run: |
          cd worker
          npx wrangler d1 export deck_db --remote --output=backup-$(date +%Y%m%d-%H%M%S).sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Run migrations
        run: |
          cd worker
          npx wrangler d1 migrations apply deck_db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy canary
        run: |
          cd worker
          npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Monitor canary (10 min)
        run: |
          echo "Monitoring canary deployment..."
          sleep 600

  deploy-worker-full:
    name: Deploy Worker (Full 100%)
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-worker-canary
    steps:
      - name: Promote to full traffic
        run: |
          echo "Canary successful, promoting to 100%"
          # Cloudflare Workers自动全量，此处可添加额外验证

  deploy-frontend:
    name: Deploy Frontend to Production
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-worker-full
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_URL: ${{ secrets.PROD_WORKER_URL }}
          VITE_GEMINI_API_KEY: ${{ secrets.PROD_GEMINI_API_KEY }}

      - name: Deploy to Cloudflare Pages
        run: |
          cd frontend
          npx wrangler pages deploy dist --project-name=deck-production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Purge CDN cache
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: deploy-frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Git tag
        run: |
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.version }}
          release_name: Release ${{ github.event.inputs.version }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changelog }}

            ## Deployment
            - Worker: ${{ secrets.PROD_WORKER_URL }}
            - Frontend: ${{ secrets.PROD_FRONTEND_URL }}
          draft: false
          prerelease: false

  notify:
    name: Notify Production Deployment
    runs-on: ubuntu-latest
    needs: [deploy-frontend, create-release]
    if: always()
    steps:
      - name: Send notification
        run: |
          STATUS="${{ needs.deploy-frontend.result }}"
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"🚀 Production deployment $STATUS\",
              \"blocks\": [{
                \"type\": \"section\",
                \"text\": {
                  \"type\": \"mrkdwn\",
                  \"text\": \"*Deck Production Deployment*\n Status: $STATUS\n Version: ${{ github.event.inputs.version }}\n URL: ${{ secrets.PROD_FRONTEND_URL }}\"
                }
              }]
            }"
