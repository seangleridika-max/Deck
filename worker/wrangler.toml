name = "deck-worker"
main = "src/index.ts"
compatibility_date = "2024-10-01"

[env.staging]
name = "deck-worker-staging"
vars = { ENVIRONMENT = "staging" }

[env.production]
name = "deck-worker"
vars = { ENVIRONMENT = "production" }

[[d1_databases]]
binding = "DB"
database_name = "deck_db"
database_id = "YOUR_DATABASE_ID"
migrations_dir = "./migrations"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "deck-assets"

[observability]
enabled = true
head_sampling_rate = 0.1
